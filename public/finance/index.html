<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신생아 홈런대출 정책 타당성 분석기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>신생아 홈런(Loans) 정책 분석기</h2>
            <p>금융경제학적 재정 효율성 시뮬레이터</p>
        </header>

        <section class="input-panel">
            <div class="input-group">
                <label>지원 가구 규모 (만 가구)</label>
                <input type="number" id="households" value="10" step="1">
            </div>
            <div class="input-group">
                <label>정부 보전 금리 차이 (%p)</label>
                <input type="number" id="interestGap" value="3.0" step="0.5">
            </div>
            <button onclick="analyzePolicy()">정책 분석 실행</button>
        </section>

        <div id="analysisResult" class="report-box">
            <p class="placeholder">수치를 입력하고 '정책 분석 실행' 버튼을 눌러주세요.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
